[build]
  command = "npx prisma generate && npx prisma db push && npx prisma db seed && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  DATABASE_URL = "file:./prisma/dev.db"

[functions]
  included_files = ["prisma/dev.db", "prisma/prisma/dev.db", "node_modules/.prisma/**", "node_modules/@prisma/engines/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"
